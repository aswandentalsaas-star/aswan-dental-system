<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>عيادة أسوان التخصصية | لوحة التحكم</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Tajawal', sans-serif; }</style>
</head>
<body class="bg-gray-50">

    <nav class="bg-blue-900 text-white p-4 shadow-lg">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold">🦷 عيادة أسوان التخصصية</h1>
            <div class="flex items-center gap-4">
                <span class="bg-green-500 px-3 py-1 rounded-full text-sm">السيرفر متصل 🟢</span>
            </div>
        </div>
    </nav>

    <div class="container mx-auto mt-8 px-4 grid grid-cols-1 lg:grid-cols-3 gap-8">
        <div class="lg:col-span-1 bg-white p-6 rounded-xl shadow-md border-t-4 border-blue-600">
            <h2 class="text-xl font-bold mb-6 text-gray-800">إضافة مريض جديد / تشغيل دورة</h2>
            <form id="clinicForm" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700">اسم المريض</label>
                    <input type="text" id="patientName" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 p-2 border">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">التاريخ الطبي</label>
                    <textarea id="medicalHistory" rows="3" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 p-2 border"></textarea>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">الإجراء الطبي</label>
                    <select id="procedure" class="mt-1 block w-full p-2 border rounded-md">
                        <option value="Tooth Extraction">خلع ضرس</option>
                        <option value="Cleaning">تنظيف لثة</option>
                        <option value="Filling">حشو تجميلي</option>
                    </select>
                </div>
                <button type="button" onclick="runCycle()" class="w-full bg-blue-600 text-white font-bold py-3 rounded-lg hover:bg-blue-700 transition">
                    تشغيل الدورة الذكية 🚀
                </button>
            </form>
        </div>

        <div class="lg:col-span-2 space-y-6">
            <div id="aiCard" class="hidden bg-blue-50 p-6 rounded-xl border border-blue-200 shadow-sm">
                <div class="flex items-center gap-2 mb-4">
                    <span class="text-2xl">🩺</span>
                    <h3 class="text-lg font-bold text-blue-900">تقرير المستشار الطبي الذكي (Groq)</h3>
                </div>
                <p id="aiReportText" class="text-gray-700 leading-relaxed italic"></p>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-100">
                    <p class="text-sm text-gray-500">المبلغ الصافي</p>
                    <p id="netAmount" class="text-2xl font-bold text-green-600">0.00 ج.م</p>
                </div>
                <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-100">
                    <p class="text-sm text-gray-500">حالة المخزون (بنج)</p>
                    <p id="stockStatus" class="text-2xl font-bold text-orange-500">50 وحدة</p>
                </div>
            </div>
        </div>
    </div>

    <div class="container mx-auto mt-12 px-4 mb-20">
        <div class="bg-white rounded-xl shadow-lg overflow-hidden border border-gray-200">
            <div class="bg-gray-800 text-white p-4 flex justify-between items-center">
                <h3 class="text-lg font-bold">🗓️ جدول حجز المواعيد (30 دقيقة / Slot)</h3>
                <span id="currentDate" class="text-sm opacity-80"></span>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-right border-collapse">
                    <thead>
                        <tr class="bg-gray-100 text-gray-700">
                            <th class="p-4 border-b">الوقت</th>
                            <th class="p-4 border-b">اسم المريض</th>
                            <th class="p-4 border-b">الحالة</th>
                            <th class="p-4 border-b">الإجراءات</th>
                        </tr>
                    </thead>
                    <tbody id="appointmentsBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        async function runCycle() {
            const data = {
                patientName: document.getElementById('patientName').value,
                medicalHistory: document.getElementById('medicalHistory').value,
                procedure: document.getElementById('procedure').value,
                cost: 2000
            };

            const response = await fetch('/api/run-cycle', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });

            const result = await response.json();
            if(result.success) {
                document.getElementById('aiCard').classList.remove('hidden');
                document.getElementById('aiReportText').innerText = result.aiReport;
                document.getElementById('netAmount').innerText = result.netAmount + " ج.م";
                loadAppointments(); // تحديث الجدول فوراً بعد الإضافة
                alert("تمت العملية بنجاح!");
            }
        }

        async function loadAppointments() {
            const response = await fetch('/api/appointments/today');
            const appointments = await response.json();
            const body = document.getElementById('appointmentsBody');
            body.innerHTML = '';

            const timeSlots = ["04:00", "04:30", "05:00", "05:30", "06:00", "06:30", "07:00", "07:30", "08:00", "08:30"];
            timeSlots.forEach(slot => {
                const booked = appointments.find(a => {
                    if (!a.startTime) return false;
                    const time = new Date(a.startTime).toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' });
                    return time === slot;
                });

                body.innerHTML += `
                    <tr class="hover:bg-gray-50 border-b">
                        <td class="p-4 font-bold text-blue-900">${slot}</td>
                        <td class="p-4">${booked ? booked.patient.name : 'متاح'}</td>
                        <td class="p-4">${booked ? '✅ محجوز' : '⚪ فارغ'}</td>
                        <td class="p-4">${booked ? '📱 واتساب' : '+ حجز'}</td>
                    </tr>`;
            });
        }

        window.onload = () => {
            loadAppointments();
            document.getElementById('currentDate').innerText = new Date().toLocaleDateString('ar-EG');
        };
    </script>
</body>
</html>
